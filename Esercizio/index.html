<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local & Session Storage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body>
    <main>
      <section>
        <div class="container">
          <div class="row justify-content-center text-center">
            <div class="col-12"><h1>Local & Session Storage</h1></div>

            <div class="col-6 col-md-4">
              <h2 cla>Input nome (local)</h2>
              <div class="input-class d-flex flex-column gap-3 justify-content-center">
                <input id="input-field" type="text" class="rounded-1 border-1" />
                <div>
                  <button id="salva" onclick="saveElement()" class="btn btn-success">Salva</button>
                  <button id="cancella" onclick="deleteElement()" class="btn btn-warning">
                    Cancella
                  </button>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-4 text-center">
              <h2>Timer (storage)</h2>
              <p id="local-timer">0</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./script.js"></script>
  </body>
</html>
